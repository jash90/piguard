# Local macOS development — Pi-hole + InfluxDB + Grafana
services:
  pi-hole:
    container_name: piguard-pihole-dev
    image: pihole/pihole:latest
    ports:
      - "8080:80/tcp"
    networks:
      - piguard
    environment:
      - FTLCONF_webserver_api_password=pihole123
      - FTLCONF_webserver_port=80
      - FTLCONF_webserver_api_max_sessions=20
    volumes:
      - pihole-etc:/etc/pihole
      - pihole-dnsmasq:/etc/dnsmasq.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/admin/"]
      interval: 10s
      timeout: 5s
      retries: 10

  # DNS proxy — forwards host port 53 to pi-hole:53
  # Uses alpine/socat on the same Docker network to work around
  # Docker Desktop macOS UDP DNS forwarding issues
  dns-proxy:
    container_name: piguard-dns-proxy
    image: alpine/socat
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    networks:
      - piguard
    restart: unless-stopped
    entrypoint: ["sh", "-c", "socat UDP-LISTEN:53,fork,reuseaddr UDP:pi-hole:53 & socat TCP-LISTEN:53,fork,reuseaddr TCP:pi-hole:53 & wait"]
    depends_on:
      pi-hole:
        condition: service_healthy

  influxdb:
    container_name: piguard-influxdb-dev
    image: influxdb:2.7
    ports:
      - "8086:8086"
    networks:
      - piguard
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin12345678
      - DOCKER_INFLUXDB_INIT_ORG=piguard
      - DOCKER_INFLUXDB_INIT_BUCKET=dns_logs
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-influx-token
    restart: unless-stopped

  grafana:
    container_name: piguard-grafana-dev
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    networks:
      - piguard
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    depends_on:
      - influxdb
    restart: unless-stopped

networks:
  piguard:

volumes:
  pihole-etc:
  pihole-dnsmasq:
  influxdb-data:
  grafana-data:
